<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WON 상속케어 - AI 서비스 프로토타입</title>
  <style>
    :root {
      --blue: #3f82f4;
      --blue-dark: #2f62d9;
      --blue-soft: #e8f2ff;
      --ink: #30363d;
      --muted: #7f8790;
      --line: #dce1e7;
      --bg: #eef4fb;
      --card: #ffffff;
      --green: #2f8d6d;
      --purple: #7968d8;
      --yellow: #f5c34b;
      --shadow: 0 18px 44px rgba(33, 45, 65, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(63, 130, 244, 0.18), transparent 34rem),
        linear-gradient(180deg, #f7fbff 0%, #e8eef6 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .stage {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .phone {
      width: min(430px, 100vw);
      min-height: 932px;
      background: #fff;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      position: relative;
    }

    .app {
      height: 100vh;
      overflow-y: auto;
      background: #eff5fc;
      scrollbar-width: thin;
      scrollbar-color: rgba(35, 52, 82, 0.7) transparent;
    }

    .app::-webkit-scrollbar {
      width: 4px;
    }

    .app::-webkit-scrollbar-thumb {
      background: rgba(35, 52, 82, 0.7);
      border-radius: 999px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      padding: 22px 20px 0;
      border-bottom: 1px solid #e9edf3;
    }

    .nav-row {
      height: 46px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 23px;
      font-weight: 850;
      line-height: 1.15;
    }

    .ai-mark {
      justify-self: end;
      width: 34px;
      height: 34px;
      border: 3px solid #30363d;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 900;
      position: relative;
    }

    .ai-mark::before,
    .ai-mark::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 7px;
      border-radius: 3px;
      background: #30363d;
      top: -8px;
    }

    .ai-mark::before { left: 10px; }
    .ai-mark::after { right: 10px; }

    .tabs {
      height: 66px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: end;
      gap: 0;
      margin-top: 8px;
    }

    .tab {
      height: 66px;
      border: 0;
      background: transparent;
      color: #888f98;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
    }

    .tab.active {
      color: #30363d;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: #30363d;
    }

    .hero {
      min-height: 548px;
      padding: 54px 20px 28px;
      background: linear-gradient(180deg, var(--hero-a), var(--hero-b));
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      right: -156px;
      top: 36px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      left: -96px;
      bottom: 108px;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .hero h2 {
      margin: 0;
      max-width: 360px;
      font-size: 31px;
      line-height: 1.28;
      color: #fff;
      font-weight: 900;
    }

    .hero p {
      margin: 16px 0 0;
      color: rgba(255, 255, 255, 0.86);
      font-size: 18px;
      font-weight: 650;
      line-height: 1.35;
    }

    .hero-cards {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 42px;
    }

    .hero-card {
      min-height: 190px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.26);
      backdrop-filter: blur(8px);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .bubble-icon {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: #fff;
      box-shadow: 0 10px 24px rgba(45, 58, 90, 0.14);
    }

    .hero-card strong {
      display: block;
      margin-top: 12px;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 900;
      color: #272d33;
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: #2f62d9;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .dots {
      position: relative;
      z-index: 2;
      margin-top: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.58);
    }

    .dots span:nth-child(2) {
      width: 24px;
      background: #fff;
    }

    .content {
      background: linear-gradient(180deg, #557ed6 0%, #eff5fc 88%);
      padding: 0 20px 30px;
    }

    .section-title {
      margin: 0 0 16px;
      padding-top: 36px;
      color: #fff;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 900;
    }

    .intake-block {
      padding-top: 32px;
    }

    .intake-block[hidden] {
      display: none;
    }

    .intake-title {
      margin: 0 0 16px;
      color: #fff;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 900;
    }

    .intake-card,
    .analysis-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 1px 0 rgba(12, 25, 40, 0.04);
    }

    .intake-card {
      padding: 22px 20px;
    }

    .intake-card h3,
    .analysis-card h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.24;
      font-weight: 900;
    }

    .intake-card p,
    .analysis-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.38;
      font-weight: 650;
    }

    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .category-chip {
      min-height: 34px;
      padding: 7px 11px;
      border-radius: 999px;
      background: #eef4ff;
      color: #2f62d9;
      font-size: 14px;
      font-weight: 850;
    }

    .input-steps {
      margin-top: 18px;
      border-top: 1px solid var(--line);
    }

    .input-step {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      border-bottom: 1px solid #edf1f5;
    }

    .step-check {
      width: 24px;
      height: 24px;
      border-radius: 99px;
      background: #3f82f4;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 900;
    }

    .step-main strong {
      display: block;
      color: #343b43;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 850;
    }

    .step-main span {
      display: block;
      margin-top: 4px;
      color: #7a828c;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 700;
    }

    .step-state {
      padding: 6px 8px;
      border-radius: 999px;
      background: #f2f5f8;
      color: #606a75;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .analysis-card {
      margin-top: 14px;
      padding: 22px 20px;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .analysis-item {
      min-height: 76px;
      border-radius: 18px;
      background: #f4f7fb;
      padding: 12px;
    }

    .analysis-item span {
      display: block;
      color: #7c858f;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 750;
    }

    .analysis-item strong {
      display: block;
      margin-top: 8px;
      color: #252b32;
      font-size: 19px;
      line-height: 1.12;
      font-weight: 900;
    }

    .analysis-alert {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: #fff8dd;
      border: 1px solid #f0dc94;
    }

    .analysis-alert strong {
      display: block;
      color: #2d3035;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 900;
    }

    .analysis-alert span {
      display: block;
      margin-top: 6px;
      color: #6f6340;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 750;
    }

    .product-block {
      padding-top: 36px;
    }

    .product-block[hidden] {
      display: none;
    }

    .product-title {
      margin: 0 0 14px;
      color: #fff;
      font-size: 23px;
      line-height: 1.2;
      font-weight: 900;
    }

    .product-input-card,
    .product-analysis-card {
      margin-bottom: 14px;
      padding: 18px;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 1px 0 rgba(12, 25, 40, 0.04);
    }

    .product-input-card h3,
    .product-analysis-card h3 {
      margin: 0;
      color: #30363d;
      font-size: 19px;
      line-height: 1.25;
      font-weight: 900;
    }

    .product-input-card p,
    .product-analysis-card p {
      margin: 7px 0 0;
      color: #727b86;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 700;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .input-pill {
      min-height: 64px;
      padding: 11px;
      border-radius: 16px;
      background: #f5f7fa;
    }

    .input-pill span {
      display: block;
      color: #7b838d;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 750;
    }

    .input-pill strong {
      display: block;
      margin-top: 7px;
      color: #29313a;
      font-size: 15px;
      line-height: 1.22;
      font-weight: 900;
    }

    .analysis-line {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: #eaf3ff;
      color: #26364f;
      font-size: 13px;
      line-height: 1.42;
      font-weight: 800;
    }

    .product-card {
      margin-top: 12px;
      padding: 18px;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 1px 0 rgba(12, 25, 40, 0.04);
    }

    .product-card:first-of-type {
      margin-top: 0;
    }

    .product-head {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .product-icon {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: #f1f6ff;
    }

    .product-head h3 {
      margin: 0;
      color: #30363d;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 900;
    }

    .product-head p {
      margin: 4px 0 0;
      color: #7b838d;
      font-size: 13px;
      line-height: 1.3;
      font-weight: 700;
    }

    .product-badge {
      padding: 6px 9px;
      border-radius: 999px;
      background: #eef4ff;
      color: #2f62d9;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .product-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .product-meta div {
      padding: 11px;
      border-radius: 16px;
      background: #f5f7fa;
    }

    .product-meta span {
      display: block;
      color: #7b838d;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 750;
    }

    .product-meta strong {
      display: block;
      margin-top: 6px;
      color: #272d33;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 900;
    }

    .product-reason {
      margin: 12px 0 0;
      color: #67717c;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 700;
    }

    .service-card,
    .metric-card,
    .share-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 1px 0 rgba(12, 25, 40, 0.04);
    }

    .service-card {
      padding: 24px 20px 18px;
    }

    .card-heading {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .card-heading h3 {
      margin: 0;
      font-size: 23px;
      font-weight: 900;
      line-height: 1.25;
    }

    .card-heading p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 650;
      line-height: 1.3;
    }

    .rows {
      border-top: 1px solid var(--line);
    }

    .row {
      min-height: 58px;
      border: 0;
      border-bottom: 1px solid #edf1f5;
      background: transparent;
      display: grid;
      grid-template-columns: 1fr 24px;
      align-items: center;
      width: 100%;
      padding: 0;
      text-align: left;
      cursor: pointer;
    }

    .row span {
      font-size: 19px;
      font-weight: 760;
      color: #41474e;
    }

    .metric-card {
      margin-top: 18px;
      padding: 22px 20px;
    }

    .metric-card h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.28;
      font-weight: 900;
      color: #283039;
    }

    .metric-copy {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
      line-height: 1.42;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .metric {
      min-height: 84px;
      padding: 13px;
      border-radius: 18px;
      background: #f4f7fb;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .metric span {
      color: #7c858f;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.2;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 21px;
      line-height: 1.1;
      font-weight: 900;
      color: #252b32;
    }

    .cta {
      width: 100%;
      min-height: 56px;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      background: var(--blue);
      color: #fff;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(63, 130, 244, 0.22);
    }

    .notice {
      margin: 12px 2px 0;
      color: #7a828c;
      font-size: 12px;
      font-weight: 650;
      line-height: 1.45;
    }

    .share-title {
      margin: 36px 0 14px;
      font-size: 24px;
      font-weight: 900;
      color: #30363d;
    }

    .share-card {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 18px;
    }

    .share {
      border: 0;
      min-height: 88px;
      border-radius: 18px;
      background: #f5f7fa;
      display: grid;
      place-items: center;
      gap: 6px;
      color: #3b424a;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
    }

    .share-dot {
      width: 34px;
      height: 34px;
      border-radius: 99px;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      background: var(--blue);
    }

    .share:nth-child(1) .share-dot {
      background: #ffe031;
      color: #191919;
    }

    .share:nth-child(3) .share-dot {
      background: #8b96a3;
    }

    .bottom-safe {
      height: 180px;
    }

    .sheet {
      position: absolute;
      inset: auto 0 0;
      z-index: 50;
      padding: 0 18px 18px;
      transform: translateY(108%);
      transition: transform 220ms ease;
      pointer-events: none;
    }

    .sheet.open {
      transform: translateY(0);
      pointer-events: auto;
    }

    .sheet-panel {
      background: #fff;
      border-radius: 26px;
      padding: 16px 18px 20px;
      box-shadow: 0 -18px 60px rgba(20, 30, 48, 0.22);
      max-height: 760px;
      overflow-y: auto;
    }

    .handle {
      width: 48px;
      height: 5px;
      border-radius: 99px;
      background: #d6dce4;
      margin: 0 auto 16px;
    }

    .sheet h3 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .sheet p {
      margin: 10px 0 0;
      color: #747d87;
      font-size: 15px;
      font-weight: 650;
      line-height: 1.45;
    }

    .chat-log {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    .chat-message {
      max-width: 86%;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 650;
    }

    .chat-message.bot {
      align-self: flex-start;
      background: #f1f5fa;
      color: #343b43;
      border-top-left-radius: 6px;
    }

    .chat-message.user {
      align-self: flex-end;
      background: #3f82f4;
      color: #fff;
      border-top-right-radius: 6px;
    }

    .chat-message.summary {
      max-width: 100%;
      align-self: stretch;
      background: #fff8dd;
      color: #4b4130;
      border: 1px solid #f1df9f;
      border-radius: 16px;
    }

    .chat-label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 900;
      opacity: 0.72;
    }

    .chat-input {
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 8px;
      margin-top: 14px;
      padding: 8px;
      border-radius: 18px;
      background: #f3f6fa;
    }

    .chat-input span {
      display: flex;
      align-items: center;
      min-height: 40px;
      padding-left: 10px;
      color: #6f7780;
      font-size: 14px;
      font-weight: 650;
    }

    .chat-input button {
      border: 0;
      border-radius: 14px;
      background: #3f82f4;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
    }

    .report-summary {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: #eaf3ff;
      border: 1px solid #cfe1ff;
      color: #26364f;
      font-size: 15px;
      line-height: 1.42;
      font-weight: 850;
    }

    .report-section {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: #f5f7fa;
    }

    .report-section h4 {
      margin: 0;
      color: #30363d;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 900;
    }

    .report-section p {
      margin: 7px 0 0;
      color: #68727d;
      font-size: 13px;
      line-height: 1.42;
      font-weight: 700;
    }

    .report-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .report-item {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: start;
    }

    .report-index {
      width: 24px;
      height: 24px;
      border-radius: 99px;
      display: grid;
      place-items: center;
      background: #3f82f4;

          `).join("")}
        </div>
        <div class="chat-input">
          <span>한정승인 서류도 알려줘</span>
          <button type="button">전송</button>
        </div>
      `;
      sheet.classList.add("open");
      backdrop.classList.add("open");
      sheet.setAttribute("aria-hidden", "false");
    }

    function openReport(report) {
      sheet.classList.remove("chat");
      nextAction.textContent = "상담 연결";
      sheetTitle.textContent = report.title;
      sheetBody.innerHTML = `
        <div class="report-summary">${report.summary}</div>
        ${report.sections.map(section => `
          <section class="report-section">
            <h4>${section.title}</h4>
            <p>${section.copy}</p>
            <div class="report-list">
              ${section.items.map(([label, detail], index) => `
                <div class="report-item">
                  <span class="report-index">${index + 1}</span>
                  <div class="report-detail"><strong>${label}</strong><span>${detail}</span></div>
                </div>
              `).join("")}
            </div>
          </section>
        `).join("")}
        <div class="report-tags">
          ${report.tags.map(tag => `<span class="report-tag">${tag}</span>`).join("")}
        </div>
        <div class="report-warning">${report.warning}</div>
      `;
      sheet.classList.add("open");
      backdrop.classList.add("open");
      sheet.setAttribute("aria-hidden", "false");
    }

    function close() {
      sheet.classList.remove("open");
      backdrop.classList.remove("open");
      sheet.setAttribute("aria-hidden", "true");
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        history.replaceState(null, "", `#${tab.dataset.tab}`);
        render(tab.dataset.tab);
      });
    });

    cta.addEventListener("click", () => {
      const screen = screens[current];
      if (screen.chat) {
        openChat(screen);
        return;
      }
      if (screen.report) {
        openReport(screen.report);
        return;
      }
      openSheet(screen.sheetTitle, screen.sheetCopy);
    });

    serviceRows.addEventListener("click", event => {
      const row = event.target.closest(".row");
      if (!row) return;
      openSheet(row.dataset.row, `${row.dataset.row} 상세 화면으로 이동하기 전 핵심 정보와 필요한 서류를 확인합니다.`);
    });

    extraResultBlock.addEventListener("click", event => {
      const button = event.target.closest("[data-extra-report]");
      if (!button) return;
      const screen = screens[current];
      const result = screen.extraResults?.[Number(button.dataset.extraReport)];
      if (result?.report) openReport(result.report);
    });

    closeSheet.addEventListener("click", close);
    backdrop.addEventListener("click", close);
    nextAction.addEventListener("click", close);

    render(current);
    if (openInitialChat) {
      setTimeout(() => openChat(screens.decision), 120);
    }
  </script>
</body>
</html>
